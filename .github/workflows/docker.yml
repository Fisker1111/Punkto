# ── Punkto — Docker build and push ───────────────────────────────────────────
# Builds and pushes two images to GitHub Container Registry (ghcr.io):
#
#   ghcr.io/fisker1111/punkto-web    — Caddy serving the static PWA
#   ghcr.io/fisker1111/punkto-relay  — Python relay node
#
# Triggers:
#   push to main  → tagged as :latest
#   push tag v*   → tagged as the version (e.g. :v0.45) AND :latest
#
# To deploy a versioned release on a node:
#   git tag v0.46 && git push origin v0.46
#   Then on the node: PUNKTO_VERSION=v0.46 docker compose pull && docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

name: Docker

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/fisker1111/punkto-web
  RELAY_IMAGE: ghcr.io/fisker1111/punkto-relay

jobs:
  # ── Validate deployment artifacts before building images ───────────────────
  # Ensures verify.sh and deployment docs are syntactically sane so a broken
  # deploy infra doesn't ride along with a good image push.
  validate:
    name: Validate deploy artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PWA JavaScript syntax checks
        run: |
          node --check pwa/app.js
          node --check pwa/ui-shell.js
          node --check pwa/ui-text.js
          node --check pwa/ui-map.js
          node --check pwa/ui-create.js
          node --check pwa/key-management.js
          node --check pwa/sw.js

      - name: Bash syntax check — deploy/verify.sh
        run: bash -n deploy/verify.sh

      - name: Verify required deploy docs exist
        run: |
          for f in \
            deploy/README.md \
            deploy/verify.sh \
            deploy/docker-compose.yml \
            DEPLOYMENT_RUNBOOK.md \
            DEPLOYMENT_SMOKE_TESTS.md \
            DEPLOYMENT_TROUBLESHOOTING.md; do
            if [[ ! -f "$f" ]]; then
              echo "::error file=$f::required deploy doc missing"
              exit 1
            fi
          done
          echo "All deploy docs present."

      - name: Dry-run verify.sh (usage guard)
        run: |
          # Script should fail fast with a usage message when called without args
          if bash deploy/verify.sh 2>&1 | grep -q "usage:"; then
            echo "verify.sh reports usage when called incorrectly ✓"
          else
            echo "::error::verify.sh did not show usage on missing args"
            exit 1
          fi

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Determine image tags ─────────────────────────────────────────────────
      # On main push: :latest
      # On tag push (v0.45): :v0.45 and :latest
      - name: Docker meta — web
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker meta — relay
        id: meta_relay
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.RELAY_IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Build and push: punkto-web ───────────────────────────────────────────
      - name: Build and push punkto-web
        uses: docker/build-push-action@v5
        with:
          context: ./pwa
          file: ./pwa/Dockerfile
          push: true
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build and push: punkto-relay ─────────────────────────────────────────
      - name: Build and push punkto-relay
        uses: docker/build-push-action@v5
        with:
          context: ./relay
          file: ./relay/Dockerfile
          push: true
          tags: ${{ steps.meta_relay.outputs.tags }}
          labels: ${{ steps.meta_relay.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "## Docker images pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.WEB_IMAGE }}\` | \`${{ steps.meta_web.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.RELAY_IMAGE }}\` | \`${{ steps.meta_relay.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
