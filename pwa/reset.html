<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resetting Punkto...</title>
  <style>
    body { background: #0a0a0a; color: #00e5ff; font-family: monospace; padding: 32px; }
    h1 { font-size: 18px; margin-bottom: 16px; }
    #log { font-size: 12px; color: #888; line-height: 1.8; }
  </style>
</head>
<body>
<h1>⟳ Resetting Punkto...</h1>
<div id="log"></div>
<script>
(async () => {
  const log = (msg) => {
    console.log(msg);
    document.getElementById('log').innerHTML += msg + '<br>';
  };

  log('Hard reset started...');

  // 1. Unregister all Service Workers
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const reg of regs) {
      await reg.unregister();
      log('Unregistered SW: ' + (reg.scope || 'unknown'));
    }
  }

  // 2. Clear all caches
  if ('caches' in window) {
    const names = await caches.keys();
    for (const name of names) {
      await caches.delete(name);
      log('Deleted cache: ' + name);
    }
  }

  // 3. Clear relevant localStorage keys
  ['punkto.identity', 'punkto.identity.v1', 'punkto.key', 'punkto.mnemonic'].forEach(k => {
    if (localStorage.getItem(k) !== null) {
      localStorage.removeItem(k);
      log('Cleared localStorage: ' + k);
    }
  });

  // 4. Delete IndexedDB databases
  if (indexedDB && indexedDB.databases) {
    try {
      const dbs = await indexedDB.databases();
      for (const db of dbs) {
        indexedDB.deleteDatabase(db.name);
        log('Deleted IndexedDB: ' + db.name);
      }
    } catch (e) { /* not all browsers support indexedDB.databases() */ }
  }

  log('Done! Redirecting...');
  setTimeout(() => {
    location.href = '/?reset=' + Date.now();
  }, 800);
})();
</script>
</body>
</html>
